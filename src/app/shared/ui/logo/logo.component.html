<span class="logo" [style.--logo-size.px]="size()">
  <svg
    class="logo__mark"
    [attr.width]="size()"
    [attr.height]="size()"
    viewBox="0 0 48 48"
    fill="none"
    role="img"
    [attr.aria-label]="showText() ? null : wordmark"
  >
    <defs>
      <linearGradient [attr.id]="gradId" x1="4" y1="10" x2="44" y2="40" gradientUnits="userSpaceOnUse">
        <stop offset="0" class="logo__stop logo__stop--1" />
        <stop offset="0.4" class="logo__stop logo__stop--2" />
        <stop offset="0.72" class="logo__stop logo__stop--3" />
        <stop offset="1" class="logo__stop logo__stop--4" />
      </linearGradient>
      <radialGradient [attr.id]="glowId" cx="0.5" cy="0.5" r="0.5">
        <stop offset="0" class="logo__halo-stop logo__halo-stop--in" />
        <stop offset="1" class="logo__halo-stop logo__halo-stop--out" />
      </radialGradient>
    </defs>

    <!-- pulsing aura -->
    <circle class="logo__halo" cx="23" cy="30" r="20" [attr.fill]="haloPaint()" />

    <!-- the lamp -->
    <g class="logo__lamp" [attr.fill]="lampPaint()" [attr.stroke]="lampPaint()">
      <path class="logo__body" d="M10 32 q0 -7 13 -7 q13 0 13 7 q0 5 -13 5 q-13 0 -13 -5 z" stroke="none" />
      <path class="logo__foot" d="M16 37 h14 q2 0 2 2 v0.6 h-18 v-0.6 q0 -2 2 -2 z" stroke="none" />
      <path class="logo__lid" d="M16 26 q7 -6 14 0" fill="none" stroke-width="2.4" stroke-linecap="round" />
      <circle class="logo__knob" cx="23" cy="21.4" r="1.9" stroke="none" />
      <path class="logo__spout" d="M10 31 q-6 -1.5 -8 -7 q5 1 9 3.4 z" stroke="none" />
      <path class="logo__handle" d="M36 29 q7 -0.5 6.5 4.4 q-0.6 3 -5.2 2.4" fill="none" stroke-width="2.6" stroke-linecap="round" />
    </g>

    <!-- wish-sparks rising from the spout -->
    <g class="logo__sparks" [attr.fill]="lampPaint()">
      <path class="logo__spark logo__spark--a" d="M4 14 l1.1 3 l3 1.1 l-3 1.1 l-1.1 3 l-1.1 -3 l-3 -1.1 l3 -1.1 z" />
      <path class="logo__spark logo__spark--b" d="M11 9 l0.7 2 l2 0.7 l-2 0.7 l-0.7 2 l-0.7 -2 l-2 -0.7 l2 -0.7 z" />
    </g>
  </svg>

  @if (showText()) {
    <span class="logo__word">{{ wordmark }}</span>
  }
</span>
