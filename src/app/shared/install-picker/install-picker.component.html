<div class="pm-tabs" role="tablist" aria-label="Package manager" (keydown)="onTablistKeydown($event)">
  @for (cmd of install.commands(); track cmd.manager) {
    <button
      type="button"
      role="tab"
      class="pm-tab"
      [attr.id]="'pm-tab-' + cmd.manager"
      aria-controls="pm-panel"
      [class.is-active]="cmd.manager === install.manager()"
      [attr.aria-selected]="cmd.manager === install.manager()"
      [tabindex]="cmd.manager === install.manager() ? 0 : -1"
      (click)="select(cmd.manager)"
    >
      <ui-icon class="pm-tab__icon" [name]="cmd.icon" [size]="18" />
      <span class="pm-tab__label">{{ cmd.label }}</span>
    </button>
  }
</div>

<div id="pm-panel" role="tabpanel" [attr.aria-labelledby]="'pm-tab-' + install.manager()">
  <ui-code-block [code]="install.current().command" lang="bash" [filename]="filename()" />
</div>
