<section class="section testimonials">
  <div class="container stack">
    <div class="testimonials__head" appReveal>
      <ui-section-header
        eyebrow="Loved by engineers"
        heading="Teams that *see* their graph"
        subtitle="Staff engineers and Angular architects use GenieOS to untangle injectors, chase circular providers and understand large apps at a glance."
      />
    </div>

    <div class="testimonials__grid">
      @for (t of testimonials(); track t.author; let i = $index) {
        <div class="testimonials__cell" [appReveal]="i * 110">
          <ui-glass-panel [interactive]="true" [glow]="t.accent">
            <figure class="quote" [style.--accent]="t.accent">
              <span class="quote__mark" aria-hidden="true">&ldquo;</span>

              <div class="quote__stars" [attr.aria-label]="'Rated 5 out of 5'">
                @for (s of stars; track s) {
                  <ui-icon name="star" [size]="15" />
                }
              </div>

              <blockquote class="quote__text">{{ t.quote }}</blockquote>

              <figcaption class="quote__author">
                <span class="quote__avatar" aria-hidden="true">{{ t.author | initials }}</span>
                <span class="quote__id">
                  <span class="quote__name">{{ t.author }}</span>
                  <span class="quote__role">{{ t.role }}</span>
                </span>
              </figcaption>
            </figure>
          </ui-glass-panel>
        </div>
      }
    </div>
  </div>
</section>
