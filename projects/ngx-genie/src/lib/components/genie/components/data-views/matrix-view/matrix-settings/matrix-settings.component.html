<div
  class="settings-panel"
  role="button"
  tabindex="0"
  [attr.aria-expanded]="!collapsed()"
  [class.collapsed]="collapsed()"
  (click)="toggleCollapsed()"
  (keydown.enter)="toggleCollapsed()"
  (keydown.space)="$event.preventDefault(); toggleCollapsed()">
  <div class="gear-icon">⚙</div>

  <div
    class="panel-content"
    (click)="$event.stopPropagation()"
    (keydown.enter)="$event.stopPropagation()"
    (keydown.space)="$event.stopPropagation()">
    <div
      class="panel-header"
      role="button"
      tabindex="0"
      [attr.aria-expanded]="!collapsed()"
      (click)="collapsed.set(true)"
      (keydown.enter)="collapsed.set(true)"
      (keydown.space)="$event.preventDefault(); collapsed.set(true)">
      <span>SYS.CONFIG</span>
      <span>[x]</span>
    </div>

    <div class="setting-row">
      <span>MATRIX RAIN</span>
      <input type="checkbox" [checked]="settings().rain" (change)="toggle('rain')">
    </div>
    <div class="setting-row">
      <span>FX</span>
      <input type="checkbox" [checked]="settings().animation" (change)="toggle('animation')">
    </div>
    <div class="setting-row">
      <span>SYNC GRID</span>
      <button (click)="resetLayout.emit()" class="btn-reset">RESET</button>
    </div>
  </div>
</div>
