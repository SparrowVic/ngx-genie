<div class="gic">
  <gic-header />
  <gic-tabs />

  @if (store.showIo()) {
    <gic-io-panel />
  }
  @if (store.ioMessage(); as msg) {
    <div class="io-msg" [class.is-ok]="msg.ok" [class.is-err]="!msg.ok">{{ msg.text }}</div>
  }

  <div class="gic__body">
    @switch (store.tab()) {
      @case ('rules') { <gic-rules-tab /> }
      @case ('tokens') { <gic-tokens-tab /> }
      @case ('framework') { <gic-framework-tab /> }
    }
  </div>
</div>
